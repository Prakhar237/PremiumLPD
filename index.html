<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Loading…</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0A0806;
    color: #FBF5E7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .loader { text-align: center; }
  .loader__dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #E4BC7E;
    border-radius: 50%;
    margin: 0 4px;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loader__dot:nth-child(2) { animation-delay: .15s; }
  .loader__dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 80%, 100% { opacity: .25; transform: scale(.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .loader__label {
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(228, 188, 126, 0.7);
  }
  .loader__manual {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.16em; color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    display: flex; gap: 24px;
  }
  .loader__manual a { color: rgba(228, 188, 126, 0.7); text-decoration: none; }
  .loader__manual a:hover { color: #E4BC7E; }
</style>
</head>
<body>

<div class="loader">
  <span class="loader__dot"></span>
  <span class="loader__dot"></span>
  <span class="loader__dot"></span>
  <div class="loader__label">Routing</div>
</div>

<div class="loader__manual">
  <a href="rankora/index.html">→ Rankora</a>
  <a href="monarque/index.html">→ Monarque</a>
</div>

<script>
(function () {
  // ===========================================================
  // Hostname → site routing
  // -----------------------------------------------------------
  // Update these arrays when you connect your two domains.
  // The router checks window.location.hostname against the
  // patterns below. Use full domain or any substring (e.g. "rankora").
  // ===========================================================
  var ROUTES = {
    rankora: [
      'rankora',          // matches rankora.com, www.rankora.com, rankora-staging.netlify.app
      'rankora.com',
      'rankora.co',
      'rankora.io'
    ],
    monarque: [
      'monarque',         // matches monarque.com, monarque.co, monarque-staging
      'monarque.com',
      'monarque.co',
      'premium',          // any domain containing "premium"
      'premiumlpd'
    ]
  };

  // Fallback if no domain pattern matches (used on localhost, GitHub Pages preview, etc.)
  var DEFAULT_SITE = 'rankora';

  var host = (location.hostname || '').toLowerCase();
  var search = new URLSearchParams(location.search);
  var override = (search.get('site') || '').toLowerCase();

  function pickSite() {
    if (override === 'rankora' || override === 'monarque') return override;

    for (var key in ROUTES) {
      var patterns = ROUTES[key];
      for (var i = 0; i < patterns.length; i++) {
        if (host.indexOf(patterns[i]) !== -1) return key;
      }
    }
    return DEFAULT_SITE;
  }

  var site = pickSite();
  var target = site + '/index.html' + location.search + location.hash;

  // Tiny delay so the loader is visible — avoids a jarring flash on fast hosts
  setTimeout(function () {
    location.replace(target);
  }, 150);
})();
</script>

</body>
</html>
